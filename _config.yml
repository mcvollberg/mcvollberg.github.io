# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Marius C. Vollberg
url: "https://mcvollberg.github.io"
email: mariusvollberg@gmail.com
description: >-
  My research investigates the thoughts and feelings underlying human social
  behavior. Working at the intersection of cognitive, affective, and social
  psychology, I study why people cooperate, help, and empathize, and why
  these tendencies have predictable limits.
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 9999 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-redirect-from
  
author:
  name   : "Marius C. Vollberg"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "I study the cognitive and affective foundations of social decision making."
  links:
    - label: "Bluesky"
      icon: "fab fa-fw fa-bluesky"
      url: "https://bsky.app/profile/mariusvollberg.bsky.social"
    - label: "Google Scholar"
      icon: "ai ai-fw ai-google-scholar"
      url: "https://scholar.google.de/citations?user=DFQsrOgAAAAJ&hl=en"


footer:
  links:
    - label: "Bluesky"
      icon: "fab fa-fw fa-bluesky"
      url: "https://bsky.app/profile/mariusvollberg.bsky.social"
    - label: "Google Scholar"
      icon: "ai ai-fw ai-google-scholar"
      url: "https://scholar.google.de/citations?user=DFQsrOgAAAAJ&hl=en"


defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true
      comments: false
      share: false
      related: 0

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
